<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Ion Rush</title>
<style>
  :root {
    --ion-blue: #16c2b3;
    --ion-deep: #0a8f86;
    --ion-pale: #d6fbf4;
    --ink: #06403d;
    /* premium onboarding aesthetic tokens */
    --cream: #F6F2E7;
    --serif: ui-serif, "Iowan Old Style", Georgia, "Times New Roman", serif;
    --gold: #e7c46a;
    --panel-bg: rgba(18,22,38,0.55);
    --pill-bg: rgba(255,255,255,0.10);
    --pill-bord: rgba(246,242,231,0.45);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(180deg, #e8fffb 0%, #9fe9df 55%, #79ddd0 100%);
    color: var(--ink);
    user-select: none; -webkit-user-select: none;
    overscroll-behavior: none; touch-action: none;
    position: fixed; width: 100%;
  }
  #wrap {
    position: relative; width: 100vw;
    height: 100vh; height: 100dvh; /* dvh avoids mobile browser-chrome jump */
    max-width: 520px; margin: 0 auto; overflow: hidden;
    box-shadow: 0 0 60px rgba(10,143,134,.25);
  }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }

  /* HUD — top journey bar (MILES WALKED, Remi walking) */
  #hud {
    position: absolute; top: env(safe-area-inset-top, 0px); left: 0; right: 0;
    padding: 14px 18px 0; pointer-events: none; z-index: 2;
  }
  #journey {
    /* leave room for the health gauge (left) and controls (right) */
    margin: 0 96px 0 58px;
  }
  #milesReadout {
    font-family: var(--serif); font-weight: 600; font-size: 22px; color: var(--cream);
    text-align: center; line-height: 1; letter-spacing: .3px;
    text-shadow: 0 1px 6px rgba(0,0,0,.55);
  }
  #milesReadout span {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    font-weight: 600; font-size: 11px; opacity: .6; letter-spacing: 1.5px;
  }
  /* the slim trail Remi walks across */
  #trail {
    position: relative; height: 30px; margin-top: 9px;
  }
  #trailLine {
    position: absolute; left: 0; right: 0; top: 22px; height: 2px; border-radius: 2px;
    background: rgba(246,242,231,.40);
    box-shadow: 0 1px 3px rgba(0,0,0,.35);
    /* evenly-spaced footprint dots behind the walker */
    background-image: radial-gradient(circle, rgba(246,242,231,.55) 1.2px, transparent 1.6px);
    background-size: 22px 2px; background-position: 4px center; background-repeat: repeat-x;
  }
  #walker {
    position: absolute; bottom: 4px; left: 0%;
    transform: translateX(-50%);
    transition: left .12s linear;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,.45));
  }
  #walker.bob { animation: walkBob .5s ease-in-out infinite; }
  @keyframes walkBob { 0%,100%{ transform: translateX(-50%) translateY(0); } 50%{ transform: translateX(-50%) translateY(-2px); } }
  #walker.reset { transition: none; }
  #walkerImg { width: 26px; height: 26px; object-fit: contain; display: block; }
  /* footprint accent flashed on each whole-mile rollover */
  #trail .step {
    position: absolute; bottom: 2px; width: 4px; height: 4px; border-radius: 50%;
    background: var(--cream); opacity: .8; pointer-events: none;
    animation: stepFade 1s ease-out forwards;
  }
  @keyframes stepFade { from{ opacity:.8; transform: scale(1);} to{ opacity:0; transform: scale(.4);} }

  /* TOP-LEFT: hydration as a compact water "health" gauge */
  #healthGauge {
    position: absolute; z-index: 3; pointer-events: none;
    top: calc(env(safe-area-inset-top, 0px) + 14px); left: 16px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  #healthTube {
    width: 13px; height: 38px; border-radius: 7px;
    background: rgba(246,242,231,.16);
    border: 1px solid rgba(246,242,231,.40);
    box-shadow: 0 1px 4px rgba(0,0,0,.4);
    overflow: hidden; position: relative;
    display: flex; align-items: flex-end;
  }
  #healthFill {
    width: 100%; height: 70%;
    background: linear-gradient(180deg, #aef6ee, #16c2b3);
    border-radius: 0 0 6px 6px;
    transition: height .15s linear, background .3s linear;
  }
  #healthGauge.mid #healthFill { background: linear-gradient(180deg, #ffe39a, #f0a23c); }
  #healthGauge.low #healthFill { background: linear-gradient(180deg, #ffb079, #ff5e52); }
  #healthGauge.low { animation: hydPulse 1s ease-in-out infinite; }
  @keyframes hydPulse { 0%,100%{ opacity:1; } 50%{ opacity:.55; } }
  #healthGlyph {
    font-size: 11px; line-height: 1; filter: drop-shadow(0 1px 2px rgba(0,0,0,.5));
  }

  /* darkening behind HUD on bright zones, keeps text legible */
  #hudShade {
    position: absolute; top: 0; left: 0; right: 0;
    height: calc(54px + env(safe-area-inset-top, 0px));
    background: linear-gradient(180deg, rgba(0,0,0,.28), rgba(0,0,0,0));
    opacity: 0; transition: opacity .8s; pointer-events: none; z-index: 1;
  }
  #hudShade.on { opacity: 1; }

  #controls {
    position: absolute; top: calc(14px + env(safe-area-inset-top, 0px)); right: 14px; z-index: 7;
    display: flex; gap: 8px; align-items: center;
  }
  #hearts {
    font-weight: 600; font-size: 14px; color: var(--cream);
    text-shadow: 0 1px 5px rgba(0,0,0,.55); letter-spacing: .5px; white-space: nowrap;
    opacity: .9; pointer-events: none;
  }
  #hearts.hidden { display: none; }
  #controls button {
    -webkit-appearance: none; appearance: none;
    font-weight: 600; font-size: 13px; letter-spacing: .5px;
    color: var(--cream); background: rgba(255,255,255,.10);
    padding: 7px 13px; border-radius: 20px; cursor: pointer;
    border: 1px solid rgba(246,242,231,.30);
    backdrop-filter: blur(8px);
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
    transition: transform .12s, background .12s, color .12s;
    min-width: 44px; min-height: 36px; /* comfortable touch target */
  }
  #controls button:active { transform: scale(.9); }
  #speedBadge.boost {
    color: #06403d; background: rgba(231,196,106,.85);
    border-color: rgba(246,242,231,.5);
    box-shadow: 0 3px 12px rgba(231,196,106,.4);
  }
  #muteBtn.muted { opacity: .55; }

  /* Overlays — frosted premium panels over the live canvas */
  .overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    background: rgba(10,14,26,0.32);
    padding: 30px; gap: 8px; z-index: 10;
  }
  .overlay.hidden { display: none; }
  /* the inner frosted panel */
  .panel {
    display: flex; flex-direction: column; align-items: center; text-align: center;
    gap: 10px; width: 100%; max-width: 360px;
    padding: 34px 30px 30px;
    background: var(--panel-bg);
    backdrop-filter: blur(14px) saturate(1.1);
    -webkit-backdrop-filter: blur(14px) saturate(1.1);
    border: 1px solid rgba(246,242,231,0.16);
    border-radius: 26px;
    box-shadow: 0 24px 60px rgba(0,0,0,.40);
    color: var(--cream);
  }
  .title {
    font-family: var(--serif); font-size: 38px; font-weight: 600; letter-spacing: .5px;
    color: var(--cream); line-height: 1.05; margin-bottom: 2px;
  }
  .title span { color: var(--cream); opacity: .8; }
  .tagline { font-family: var(--serif); font-size: 16px; opacity: .82; font-style: italic; margin-top: -2px; }
  .sub { font-size: 14px; max-width: 300px; line-height: 1.55; opacity: .78; }
  .sub b { color: var(--cream); font-weight: 700; }
  .sub i { color: var(--gold); font-style: italic; }
  .bottle-emoji { font-size: 56px; margin-bottom: 2px; filter: drop-shadow(0 6px 12px rgba(0,0,0,.35)); }
  .remi { width: 110px; height: 110px; object-fit: contain; margin-bottom: 2px;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,.4)); }
  /* primary slim translucent capsule */
  button {
    margin-top: 16px; cursor: pointer;
    background: var(--pill-bg);
    border: 1px solid var(--pill-bord);
    color: var(--cream); font-weight: 500; font-size: 17px; letter-spacing: .3px;
    height: 52px; padding: 0 34px; border-radius: 26px;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    box-shadow: 0 6px 18px rgba(0,0,0,.22);
    transition: transform .1s, background .15s;
  }
  button:active { transform: scale(.96); background: rgba(255,255,255,.18); }
  .hint { font-size: 11px; opacity: .5; margin-top: 14px; line-height: 1.5; max-width: 300px; }
  .big-score { font-family: var(--serif); font-size: 46px; font-weight: 600; color: var(--cream); line-height: 1; }
  .best { font-size: 13px; opacity: .65; letter-spacing: .3px; }
  .legend { display:flex; gap:16px; margin-top:8px; font-size:11px; flex-wrap:wrap; justify-content:center; opacity:.72; }
  .legend div { display:flex; align-items:center; gap:6px; }
  .dot { width:12px; height:12px; border-radius:50%; display:inline-block; }

  /* understated cream text links (secondary actions) */
  .textbtn {
    margin-top: 0; background: none; border: none; box-shadow: none;
    color: var(--cream); font-weight: 500; font-size: 13px; padding: 6px 4px;
    border-radius: 0; opacity: .7; backdrop-filter: none; height: auto;
    transition: opacity .15s;
  }
  .textbtn:active { transform: scale(.96); opacity: 1; }

  /* a row of cream links separated by middots */
  .linkrow { display:flex; gap:6px; align-items:center; flex-wrap:wrap; justify-content:center; margin-top:8px; }
  .linkrow .sep { color: var(--cream); opacity: .35; font-size: 12px; }

  /* Game-over actions row */
  .actions { display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:center; }
  #shareBtn { /* now a text link, styled via .textbtn */ }

  /* New-best celebration — elegant gold serif */
  #bestBanner {
    font-family: var(--serif); font-size: 22px; font-weight: 600; letter-spacing: .5px;
    color: var(--gold); text-shadow: 0 0 22px rgba(231,196,106,.5);
    margin-bottom: 2px; opacity: 0; transform: scale(.7); transition: opacity .35s, transform .35s;
  }
  #bestBanner.show { opacity: 1; transform: scale(1); animation: bestPulse 1.8s ease-in-out infinite; }
  @keyframes bestPulse { 0%,100%{ opacity:1;} 50%{ opacity:.78;} }

  /* brief "copied!" toast */
  #toast {
    position: absolute; left: 50%; bottom: 16%; transform: translateX(-50%) translateY(8px);
    background: var(--panel-bg); backdrop-filter: blur(10px);
    border: 1px solid rgba(246,242,231,.2); color: var(--cream);
    font-size: 13px; padding: 9px 18px; border-radius: 20px; z-index: 30;
    opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Combo / streak / zone title flash */
  #eggTitle {
    position: absolute; left: 50%; top: 42%; transform: translate(-50%,-50%) scale(.7);
    z-index: 8; pointer-events: none; text-align: center; opacity: 0;
    font-size: clamp(30px,8vw,54px); font-weight: 900; font-style: italic; letter-spacing: -1px;
    color: #fff; text-shadow: 0 3px 0 var(--ion-deep), 0 0 22px rgba(22,194,179,.8);
    transition: opacity .25s, transform .25s;
  }
  #eggTitle.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  #eggTitle small { display:block; font-size: .42em; letter-spacing: 1px; opacity: .85; margin-top: 4px; }

  /* Retro CRT scanlines */
  #scanlines {
    position: absolute; inset: 0; z-index: 6; pointer-events: none; opacity: 0;
    transition: opacity .8s; mix-blend-mode: multiply;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0px, rgba(0,0,0,.18) 1px, transparent 2px, transparent 4px);
  }
  #scanlines.on { opacity: 1; }
  #wrap.retro { filter: saturate(1.5) contrast(1.12); }

  /* Onboarding story */
  #onboard {
    position: absolute; inset: 0; z-index: 20; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; padding: 28px;
    background: radial-gradient(circle at 50% 30%, #18d6c6 0%, #0a8f86 70%, #06403d 100%);
    color: #fff;
  }
  #onboard.hidden { display: none; }
  #obArt {
    width: 168px; height: 168px; display: flex; align-items: center; justify-content: center;
    font-size: 96px; margin-bottom: 12px;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,.3));
  }
  #obArt img { width: 168px; height: 168px; object-fit: contain; }
  #obText {
    font-size: 19px; line-height: 1.55; max-width: 340px; min-height: 92px;
    font-weight: 500; text-shadow: 0 1px 2px rgba(0,0,0,.25);
  }
  #obText b { color: #fff7a8; }
  #obText i { color: #aef6ee; font-style: italic; }
  #obDots { display: flex; gap: 8px; margin: 18px 0 6px; }
  #obDots .od { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,.35); transition: background .2s, transform .2s; }
  #obDots .od.on { background: #fff; transform: scale(1.25); }
  #obBtns { display: flex; gap: 12px; align-items: center; }
  #obNext {
    margin-top: 8px; background: #fff; color: var(--ion-deep);
    box-shadow: 0 8px 20px rgba(0,0,0,.25);
  }
  #obSkip {
    margin-top: 8px; background: none; border: none; box-shadow: none;
    color: rgba(255,255,255,.85); font-weight: 800; font-size: 14px; padding: 10px 12px;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <div id="hudShade"></div>

  <!-- TOP-LEFT: hydration as a compact water/health gauge -->
  <div id="healthGauge" title="Hydration">
    <div id="healthTube"><div id="healthFill"></div></div>
    <div id="healthGlyph">💧</div>
  </div>

  <!-- TOP: MILES WALKED journey bar with Remi walking along it -->
  <div id="hud">
    <div id="journey">
      <div id="milesReadout">0.0 <span>mi</span></div>
      <div id="trail">
        <div id="trailLine"></div>
        <div id="walker"><img id="walkerImg" src="assets/remi_1.png" alt="" onerror="this.outerHTML='🥾'"></div>
      </div>
    </div>
  </div>

  <div id="controls">
    <div id="hearts" class="hidden">❤ x0</div>
    <button id="speedBadge" title="Tap to change speed">1×</button>
    <button id="muteBtn" title="Mute / unmute">🔊</button>
  </div>
  <div id="scanlines"></div>
  <div id="eggTitle"></div>

  <!-- Onboarding story -->
  <div class="overlay hidden" id="onboard">
    <div id="obArt">🥵</div>
    <div id="obText"></div>
    <div id="obDots"></div>
    <div id="obBtns">
      <button id="obSkip">Skip</button>
      <button id="obNext">Next</button>
    </div>
  </div>

  <!-- Start -->
  <div class="overlay" id="startScreen">
    <div class="panel">
      <img class="remi" src="assets/remi_4.png" alt="" onerror="this.style.display='none'">
      <div class="title">Ion Rush</div>
      <div class="tagline">Cross the Dry. Go the distance.</div>
      <div class="legend">
        <div><span class="dot" style="background:linear-gradient(180deg,#74e3d6,#16c2b3)"></span>Water</div>
        <div><span class="dot" style="background:linear-gradient(180deg,#fff7a8,#ffd400)"></span>Ion</div>
        <div><span class="dot" style="background:linear-gradient(180deg,#6b4a35,#3a2418)"></span>Avoid coffee</div>
      </div>
      <button id="startBtn">Begin the Crossing</button>
      <div class="linkrow">
        <button id="replayIntroBtn" class="textbtn">Replay intro</button>
        <span class="sep">·</span>
        <button id="lbStartBtn" class="textbtn">🏆 Leaderboard</button>
      </div>
      <div class="hint">Drag to move · tap the badge for speed · keys ← → F 1–4 M</div>
    </div>
  </div>

  <!-- Game over -->
  <div class="overlay hidden" id="overScreen">
    <div class="panel">
      <div id="bestBanner">New Furthest</div>
      <div class="title">Out of Water</div>
      <div class="big-score" id="finalScore">0.0 mi</div>
      <div class="best" id="bestScore">Best 0.0 mi</div>
      <div class="sub" id="overMsg"></div>
      <button id="againBtn">Cross Again</button>
      <div class="linkrow">
        <button id="shareBtn" class="textbtn">Share</button>
        <span class="sep">·</span>
        <button id="lbOverBtn" class="textbtn">🏆 Leaderboard</button>
        <span class="sep">·</span>
        <button id="debugBtn" class="textbtn">Copy debug log</button>
      </div>
    </div>
  </div>

  <!-- Revive prompt -->
  <div class="overlay hidden" id="reviveScreen">
    <div class="panel">
      <div class="title">Out of Water</div>
      <div class="sub">Spend a heart to revive Remi and keep this run going.</div>
      <div id="reviveHearts" class="big-score">❤ x0</div>
      <button id="reviveBtn">Use ❤ Revive</button>
      <button id="endRunBtn" class="textbtn">Keep ❤</button>
    </div>
  </div>

  <div id="toast">copied!</div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('wrap');

  let W, H, DPR;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    const r = wrap.getBoundingClientRect();
    W = r.width; H = r.height;
    canvas.width = W * DPR; canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---- Haptics (no-op on web, native bridge on iOS) ----
  function haptic(kind){ try{ window.webkit?.messageHandlers?.haptic?.postMessage(kind); }catch(e){} }

  // ---- Game Center (no-op on web, native bridge on iOS) ----
  function gc(action, extra){ try { window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.gamecenter && window.webkit.messageHandlers.gamecenter.postMessage(Object.assign({action:action}, extra||{})); } catch(e){} }

  // ---- Hearts (persistent, bankable meta-collectible) ----
  const HEART_CAP = 3;
  let hearts = Math.max(0, Math.min(HEART_CAP, parseInt(localStorage.getItem('ionrush_hearts'), 10) || 0));
  function saveHearts(){ try { localStorage.setItem('ionrush_hearts', String(hearts)); } catch(e){} }
  function setHearts(n){ hearts = Math.max(0, Math.min(HEART_CAP, n)); saveHearts(); updateHeartHUD(); }
  function updateHeartHUD(){
    const el = document.getElementById('hearts');
    if (!el) return;
    el.textContent = '❤ x' + hearts;
    el.classList.toggle('hidden', !(state === State.PLAY && hearts > 0));
  }
  // revive / invulnerability state
  let revivedThisRun = false;
  let invulnTimer = 0; // seconds of post-revive invulnerability
  let heartSpawnTimer = 35 + Math.random() * 20; // first heart window (35-55s)

  // ---- Game state ----
  const State = { MENU: 0, PLAY: 1, OVER: 2 };
  let state = State.MENU;

  // ---- Speed control ----
  const SPEEDS = [1, 1.5, 2, 3];
  let speedIdx = 0;
  let speed = SPEEDS[speedIdx];

  // ---- Sound engine (WebAudio, no files) ----
  let audioCtx = null, muted = false, master = null, reverbSend = null, noiseBuf = null, audioUnlocked = false;
  const PENT = [523.25, 587.33, 659.25, 783.99, 880, 1046.5, 1174.66, 1318.5]; // C5 D5 E5 G5 A5 C6 D6 E6

  function initAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { audioCtx = null; return; }
      master = audioCtx.createGain(); master.gain.value = 0.85; master.connect(audioCtx.destination);
      const conv = audioCtx.createConvolver();
      const len = Math.floor(audioCtx.sampleRate * 2.6);
      const imp = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
      for (let ch = 0; ch < 2; ch++) {
        const d = imp.getChannelData(ch);
        for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.4);
      }
      conv.buffer = imp;
      reverbSend = audioCtx.createGain(); reverbSend.gain.value = 1;
      reverbSend.connect(conv); conv.connect(master);
      const n = Math.floor(audioCtx.sampleRate * 1);
      noiseBuf = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
      const nd = noiseBuf.getChannelData(0);
      for (let i = 0; i < n; i++) nd[i] = Math.random() * 2 - 1;
      startAmbient();
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (audioCtx && !audioUnlocked) {
      try {
        const b = audioCtx.createBuffer(1, 1, 22050);
        const s = audioCtx.createBufferSource(); s.buffer = b; s.connect(audioCtx.destination); s.start(0);
        audioUnlocked = true;
      } catch (e) {}
    }
  }

  let beatTimer = null, lastBeat = 0;
  const BEAT = 0.82; // seconds (~73 BPM)
  function startAmbient() {
    if (!audioCtx || beatTimer) return;
    lastBeat = audioCtx.currentTime;
    beatTimer = setInterval(() => { lastBeat = audioCtx.currentTime; }, BEAT * 1000);
  }
  function onBeatNow() { return audioCtx && !muted && (audioCtx.currentTime - lastBeat) < 0.17; }
  function env(g, t0, vol, a, d) {
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol, t0 + a);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + a + d);
  }
  function voice(freq, o = {}) {
    if (!audioCtx || muted) return;
    let { type = 'sine', dur = 0.3, vol = 0.2, a = 0.005, detune = 0, slideTo = null, wet = 0.25, delay = 0 } = o;
    // Retro zone chiptunes everything: smooth waves become buzzy ones
    if (retroAudio) type = type === 'sine' ? 'square' : (type === 'triangle' ? 'sawtooth' : type);
    const t0 = audioCtx.currentTime + 0.02 + delay;
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();

  function updateZones(dt) {

      const k = Math.min(1, dt / xfadeT);
      for (let i = 0; i < 3; i++) {
        skyTop[i] += (skyTopTo[i] - skyTop[i]) * k;
        skyBot[i] += (skyBotTo[i] - skyBot[i]) * k;
      }
      xfadeT = Math.max(0, xfadeT - dt);
    } else { skyTop = skyTopTo.slice(); skyBot = skyBotTo.slice(); }

    zoneTimer -= dt;
    if (zoneTimer <= 0) advanceZone();

    updateAtmo(dt);
  }

  function updateAtmo(dt) {
    const z = curZoneObj, p = z.particles;
    for (const m of atmo) {
      if (p === 'dust') {
        m.x += m.vx * dt; m.y += m.vy * dt;
        if (m.x < -5) { m.x = W + 5; m.y = Math.random() * H; }
      } else if (p === 'fireflies') {
        m.ph += m.sp * dt; m.x += m.dx * dt; m.y += m.dy * dt;
        if (m.x < 0 || m.x > W) m.dx *= -1;
        if (m.y < H * 0.25 || m.y > H) m.dy *= -1;
      } else if (p === 'ash') {
        m.y += m.vy * dt; m.x += m.vx * dt + Math.sin(m.ph + elapsed) * 6 * dt; m.ph += dt;
        if (m.y > H + 5) { m.y = -5; m.x = Math.random() * W; }
      } else if (p === 'snow') {
        m.y += m.vy * dt; m.x += Math.sin(m.ph + elapsed * 0.6) * 14 * dt; m.ph += dt;
        if (m.y > H + 5) { m.y = -5; m.x = Math.random() * W; }
      }
    }
    // thunderstorm lightning flashes
    if (z.key === 'thunder') {
      lightningT -= dt;
      if (lightningT <= 0) { lightningFlash = 0.9; lightningT = 2.5 + Math.random() * 4; SFX.thunder(); }
    }
    if (lightningFlash > 0) lightningFlash = Math.max(0, lightningFlash - dt * 3);
  }

  function flashTitle(txt, subtxt) {
    const el = document.getElementById('eggTitle');
    el.innerHTML = txt + (subtxt ? '<small>' + subtxt + '</small>' : '');
    el.classList.add('show');
    clearTimeout(flashTitle._t);
    flashTitle._t = setTimeout(() => el.classList.remove('show'), subtxt ? 1100 : 900);
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 70; i++) stars.push({ x: Math.random() * W, y: Math.random() * H * 0.85, r: Math.random() * 1.6 + 0.4, tw: Math.random() * 6 });
  }

  function konamiUnlock() {
    if (state !== State.PLAY) return;
    SFX.golden();
    for (let k = 0; k < 3; k++) spawnDrop('golden');
    flashTitle('★ GOLDEN ★');
    haptic('success');
  }

  function playerHomeY() { return H - 90; }

  function reset() {
    score = 0; miles = 0; hydration = 0.82; combo = 1; comboTimer = 0; lastWholeMile = 0;
    spawnTimer = 0; spawnGap = 0.85; elapsed = 0; shakeT = 0;
    drops = []; particles = []; floaters = [];
    cleanStreak = 0; lastComboTitle = 0; thunderTimer = 0;
    rainDrops = []; atmo = []; lightningT = 0; lightningFlash = 0;
    forceTimer = 0; forceField = false;
    shieldSpawnTimer = 28 + Math.random() * 12;
    revivedThisRun = false; invulnTimer = 0;
    heartSpawnTimer = 35 + Math.random() * 20;
    // milestone / record flags
    tierMileHit = {}; roundMileHit = 0; recordBroken = false;
    // journey / zone state — start at MIDDAY (T1)
    player.w = BASE_W;
    recentKeys = []; zoneCount = 1; oasisCadence = 4;
    const z0 = ZBY.midday;
    curZoneObj = z0; prevZoneObj = z0;
    skyTop = hexToRgb(z0.sky[0]); skyBot = hexToRgb(z0.sky[1]);
    skyTopTo = skyTop.slice(); skyBotTo = skyBot.slice(); xfadeT = 0;
    let dur = z0.dur[0] + Math.random() * (z0.dur[1] - z0.dur[0]);
    zoneTimer = dur;
    recentKeys.push(z0.key);
    applyZoneFlags();
    player.x = W / 2; player.y = playerHomeY(); player.vx = 0; player.tilt = 0; player.pop = 0;
    cupVX = 0; lastPlayerX = player.x;
    resetTelemetry();
  }

  // ---- Input (relative drag, no teleport) ----
  let keyLeft = false, keyRight = false;
  let dragging = false, dragPointerStartX = 0, dragCupStartX = 0;
  const GAIN = 1.7; // a short thumb swipe covers the whole width
  function clientX(e) {
    if (e.touches && e.touches.length) return e.touches[0].clientX;
    if (e.changedTouches && e.changedTouches.length) return e.changedTouches[0].clientX;
    return e.clientX;
  }
  function clampPlayerX(x) { return Math.max(player.w/2, Math.min(W - player.w/2, x)); }
  function dragStart(e) {
    if (state !== State.PLAY) return;
    const x = clientX(e);
    if (x == null || isNaN(x)) return;
    dragging = true;
    dragPointerStartX = x;
    dragCupStartX = player.x;
    // do NOT move the cup on touch-down
  }
  function dragMove(e) {
    if (!dragging || state !== State.PLAY) return;
    const x = clientX(e);
    if (x == null || isNaN(x)) return;
    player.x = clampPlayerX(dragCupStartX + (x - dragPointerStartX) * GAIN);
  }
  function dragEnd() { dragging = false; }
  // mouse
  canvas.addEventListener('mousedown', e => { initAudio(); dragStart(e); });
  window.addEventListener('mousemove', dragMove);
  window.addEventListener('mouseup', dragEnd);
  // touch
  canvas.addEventListener('touchstart', e => { initAudio(); dragStart(e); e.preventDefault(); }, { passive: false });
  canvas.addEventListener('touchmove', e => { dragMove(e); e.preventDefault(); }, { passive: false });
  window.addEventListener('touchend', dragEnd);
  ['pointerdown'].forEach(ev =>
    window.addEventListener(ev, () => initAudio(), { passive: true }));
  function setSpeed(idx) {
    speedIdx = (idx + SPEEDS.length) % SPEEDS.length;
    speed = SPEEDS[speedIdx];
    SFX.speed();
    updateSpeedBadge();
  }
  // Hidden Konami bonus only
  function handleEggKey(e) {
    const k = e.key.toLowerCase();
    konamiBuf.push(k);
    if (konamiBuf.length > KONAMI.length) konamiBuf.shift();
    if (konamiBuf.length === KONAMI.length && KONAMI.every((v, i) => v === konamiBuf[i])) { konamiBuf = []; konamiUnlock(); }
  }
  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') keyLeft = true;
    if (e.key === 'ArrowRight') keyRight = true;
    if (e.key === 'f' || e.key === 'F' || e.key === '+' || e.key === '=') setSpeed(speedIdx + 1);
    else if (e.key === '-' || e.key === '_') setSpeed(speedIdx - 1);
    else if (e.key >= '1' && e.key <= '4') setSpeed(+e.key - 1);
    else if (e.key === 'm' || e.key === 'M') toggleMute();
    handleEggKey(e);
  });
  window.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft') keyLeft = false;
    if (e.key === 'ArrowRight') keyRight = false;
  });

  // ---- Drop types ----
  const TYPES = {
    aqua: { good: true,  r: 18, hyd: 0.080, pts: 10, color: ['#aef6ee', '#16c2b3'] },
    ion:    { good: true,  r: 13, hyd: 0.036, pts: 5,  color: ['#fff7a8', '#ffd400'], ion: true },
    water:  { good: true,  r: 16, hyd: 0.056, pts: 6,  color: ['#e9fffb', '#74e3d6'] },
    soda:   { good: false, r: 17, hyd: -0.10, pts: 0, color: ['#ff9a7a', '#e23c3c'] },
    coffee: { good: false, r: 16, hyd: -0.08, pts: 0, color: ['#9c6f4e', '#3a2418'] },
    golden: { good: true,  r: 21, hyd: 0.18,  pts: 50, color: ['#fff3b0', '#ffb800'], golden: true },
    shield: { good: true,  r: 19, hyd: 0.02,  pts: 5,  color: ['#bfe9ff', '#5aa9ff'], shield: true },
    heart:  { good: true,  r: 19, hyd: 0.01,  pts: 0,  color: ['#ffd0d6', '#ff3b5c'], heart: true },
  };

  function spawnDrop(forceKey) {
    let key = forceKey;
    if (!key) {
      const roll = Math.random();
      // 60% good / 40% bad (unchanged balance)
      if (roll < 0.33) key = 'aqua';
      else if (roll < 0.485) key = 'ion';
      else if (roll < 0.60) key = 'water';
      else if (roll < 0.80) key = 'soda';
      else key = 'coffee';
    }
    const t = TYPES[key];
    let x = 30 + Math.random() * (W - 60);
    // ---- never let an opposite-category (good vs bad) drop fully overlap ----
    // Enforce a minimum horizontal gap vs opposite-type drops arriving around
    // the same time, so a quick player can always thread between them.
    const MIN_OPP_GAP = player.w * 0.42 + 18 + 20; // mouth-half + bad radius + margin
    const rimYnow = player.y - player.h / 2;
    for (let pass = 0; pass < 3; pass++) {
      let conflict = null, worstDx = Infinity;
      for (const o of drops) {
        if (o.t.good === t.good) continue;          // same category — ignore
        if (o.y > rimYnow + CATCH_BAND) continue;    // already past the cup — ignore
        if (Math.abs(o.y - (-30)) >= 160) continue;  // not arriving around same time
        const dx = Math.abs(o.x - x);
        if (dx < MIN_OPP_GAP && dx < worstDx) { conflict = o; worstDx = dx; }
      }
      if (!conflict) break;
      const roomRight = (W - 30) - conflict.x;       // space to push x to the right of conflict
      const roomLeft = conflict.x - 30;              // space to the left
      // try shifting toward whichever side has more room
      let nx;
      if (roomRight >= roomLeft) {
        nx = Math.min(W - 30, conflict.x + MIN_OPP_GAP);
        if (nx - conflict.x < MIN_OPP_GAP) {         // right side too tight
          const altL = Math.max(30, conflict.x - MIN_OPP_GAP);
          if (conflict.x - altL >= nx - conflict.x) nx = altL; // left reaches farther
        }
      } else {
        nx = Math.max(30, conflict.x - MIN_OPP_GAP);
        if (conflict.x - nx < MIN_OPP_GAP) {
          const altR = Math.min(W - 30, conflict.x + MIN_OPP_GAP);
          if (altR - conflict.x >= conflict.x - nx) nx = altR;
        }
      }
      x = nx + (Math.random() - 0.5) * 6;            // tiny jitter so it isn't robotic
      x = Math.max(30, Math.min(W - 30, x));
    }
    let vy = 120 + elapsed * 4 + Math.random() * 70;
    const d = {
      key, t, x,
      y: -30,
      vy: vy, vx: 0, bounced: false,
      rot: Math.random() * 6, vr: (Math.random() - .5) * 3, wob: Math.random() * 6
    };
    // Sandstorm wind: give the drop a steady ±~40px/s horizontal drift
    if (curZoneObj && curZoneObj.twist === 'wind') d.wind = (Math.random() < 0.5 ? -1 : 1) * (28 + Math.random() * 24);
    // Heat Mirage ONLY: ≤25% of normal good drops are shimmering decoys that fade away
    if (curZoneObj && curZoneObj.key === 'mirage' && curZoneObj.twist === 'mirage' &&
        !forceKey && t.good && !t.ion && Math.random() < 0.25) {
      d.decoy = true; d.decoyT = 0.7 + Math.random() * 0.6;
      tele.decoys++;
    }
    drops.push(d);
  }

  function burst(x, y, colors, n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2, s = 60 + Math.random() * 180;
      particles.push({
        x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 40,
        life: 0.6 + Math.random() * 0.4, age: 0,
        r: 2 + Math.random() * 4, color: colors[Math.random() < .5 ? 0 : 1]
      });
    }
  }

  let floaters = [];
  function floatText(x, y, text, color) {
    floaters.push({ x, y, text, color, age: 0, life: 0.9 });
  }

  // ---- Update ----
  function update(dt) {
    elapsed += dt;
    updateZones(dt);

    // ---- MILES accrual (primary metric) ----
    let pace = Math.min(0.25, 0.12 + miles * 0.006);
    pace *= (1 + Math.min(0.4, (combo - 1) * 0.06)); // combo tailwind
    miles += dt * pace;
    checkMilestones();

    // power-up timer
    if (forceTimer > 0) { forceTimer = Math.max(0, forceTimer - dt); }
    forceField = forceTimer > 0;

    // shield power-up spawn scheduler (rare)
    shieldSpawnTimer -= dt;
    if (shieldSpawnTimer <= 0) {
      spawnDrop('shield');
      shieldSpawnTimer = 25 + Math.random() * 15;
    }

    // heart collectible spawn scheduler (rare, never when banked at cap)
    heartSpawnTimer -= dt;
    if (heartSpawnTimer <= 0) {
      if (hearts < HEART_CAP) spawnDrop('heart');
      heartSpawnTimer = 35 + Math.random() * 20;
    }

    // post-revive invulnerability timer
    if (invulnTimer > 0) invulnTimer = Math.max(0, invulnTimer - dt);

    // difficulty ramp (unchanged)
    spawnGap = Math.max(0.32, 0.85 - elapsed * 0.012);
    spawnTimer -= dt;
    if (spawnTimer <= 0) { spawnDrop(); spawnTimer = spawnGap; if (Math.random() < 0.15 + elapsed*0.004) spawnDrop(); }

    // player movement (keyboard; drag updates player.x directly via events)
    let kv = 0;
    if (keyLeft) kv -= 1; if (keyRight) kv += 1;
    if (kv) { player.x += kv * 520 * dt; dragging = false; }
    player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x));
    // ---- cup leans into its direction of travel (velocity-driven tilt) ----
    // Compare to LAST frame's x so touch-drag (which moves player.x between frames) is captured.
    const instVX = dt > 0 ? (player.x - lastPlayerX) / dt : 0;
    cupVX += (instVX - cupVX) * Math.min(1, dt * 14);        // smooth the velocity
    const targetTilt = Math.max(-0.32, Math.min(0.32, cupVX * 0.0012));
    player.tilt += (targetTilt - player.tilt) * Math.min(1, dt * 12);
    lastPlayerX = player.x;
    if (player.pop > 0) player.pop = Math.max(0, player.pop - dt * 4.5);

    // combo decay
    if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) { combo = 1; lastComboTitle = 0; } }

    // drain over time (harder tuning) — Ember Badlands runs 1.3× hotter
    const drainMul = curZoneObj.twist === 'hotter' ? 1.3 : 1;
    const drainAmt = dt * (0.034 + elapsed * 0.00065) * drainMul;
    hydration -= drainAmt;
    tele.hydLostPassive += drainAmt;

    // telemetry: zone-visit order + periodic timeline samples + hydration min
    if (tele.zonesVisited[tele.zonesVisited.length - 1] !== curZoneObj.key) tele.zonesVisited.push(curZoneObj.key);
    tele._sampleT -= dt;
    if (tele._sampleT <= 0) { teleSample(); tele._sampleT = 3; }
    if (hydration < tele.hydMin) tele.hydMin = hydration;

    // drops
    const px = player.x, py = player.y, pw = player.w;
    const rimY = py - player.h / 2;        // top rim (open mouth) of the cup
    const mouthHalf = pw * 0.46;           // mouth ~92% of cup; thin walls still bounce edge-hits
    const windDrift = curZoneObj.twist === 'wind' ? 40 : 0;
    for (let i = drops.length - 1; i >= 0; i--) {
      const d = drops[i];
      d.y += d.vy * dt;
      if (d.vx) { d.x += d.vx * dt; d.vx *= 0.92; if (Math.abs(d.vx) < 2) d.vx = 0; } // bounce/push velocity, decays
      if (d.wind) d.x += d.wind * dt;            // per-drop horizontal wind drift
      else if (windDrift) d.x += windDrift * dt; // ambient zone wind
      d.rot += d.vr * dt;
      d.wob += dt * 4;

      // mirage decoy: shimmer then vanish before reaching the cup (gives nothing)
      if (d.decoy) {
        d.decoyT -= dt;
        if (d.decoyT <= 0 || d.y >= rimY - 6) {
          burst(d.x, d.y, ['#fff0a0', '#f2c24a'], 6);
          drops.splice(i, 1);
          continue;
        }
      }

      // Force-field power-up: only active in the bottom ~40% of the screen.
      if (forceField && d.y > H * 0.6) {
        if (d.t.good) {
          // only attract good drops that are still ABOVE the catch rim; never yank
          // a drop that has already fallen past back up.
          if (d.y < rimY) {
            d.x += (px - d.x) * Math.min(1, dt * 7);
            d.y += (py - d.y) * Math.min(1, dt * 5);
          }
        } else {
          d.x += (d.x < px ? -1 : 1) * 540 * dt;
        }
      }

      // TOP-MOUTH CATCH takes priority: any drop entering the mouth opening
      // within the rim band is caught reliably, tested BEFORE any bounce logic.
      // (sides don't catch). A bounced drop has been deflected and can't be caught.
      if (!d.bounced && d.y >= rimY && d.y <= rimY + CATCH_BAND && Math.abs(d.x - px) <= mouthHalf) {
        catchDrop(d);
        drops.splice(i, 1);
        continue;
      }
      // side-wall bounce: ONLY on the outer cup walls — strictly outside the
      // mouth (offset > mouthHalf), within the wall+radius, at the cup-body
      // vertical level. Never near the mouth/top-center. Horizontal ricochet:
      // kicked outward and continues falling (no upward pop).
      if (!d.bounced) {
        const offset = Math.abs(d.x - px);
        if (d.y >= rimY && d.y <= py + player.h / 2 &&
            offset > mouthHalf && offset <= pw / 2 + d.t.r) {
          const dir = (d.x - px) >= 0 ? 1 : -1;
          d.x = px + dir * (pw / 2 + d.t.r);                // resolve penetration: snap to OUTSIDE the wall (never overlap)
          d.vx = dir * (230 + Math.random() * 70);          // kick outward horizontally
          d.vy = Math.max(40, d.vy * 0.5);                  // dampen vertical, keep falling
          d.bounced = true;
          tele.wallBounces++;
          // juice: spark particles + cup wobble + light "tok"
          for (let s = 0; s < 6; s++) {
            const a = (-Math.PI / 2) + dir * (0.3 + Math.random() * 0.9), sp = 70 + Math.random() * 130;
            particles.push({ x: d.x, y: d.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 30,
              life: 0.4 + Math.random() * 0.3, age: 0, r: 1.5 + Math.random() * 2.5,
              color: d.t.color[Math.random() < .5 ? 0 : 1] });
          }
          player.pop = Math.max(player.pop, 0.45);
          player.tilt += dir * 0.12;
          SFX.tink();
          haptic('light');
        }
      }
      if (d.y > H + 50 || d.y < -70) {
        // a good drop that fell off the bottom (not caught, not bounced, not a decoy) is a MISS
        if (d.y > H + 50 && d.t.good && !d.bounced && !d.decoy && !d.t.heart && !d.t.shield) tele.missedGood++;
        drops.splice(i, 1);
      }
    }

    // ---- light in-flight safeguard: keep opposite-type pairs from stacking ----
    // If drift would push a good+bad pair within ~MIN_OPP_GAP*0.6 while both are
    // still above the rim, gently nudge them apart (subtle, never snappy).
    {
      const NUDGE = (player.w * 0.42 + 18 + 20) * 0.6;
      for (let a = 0; a < drops.length; a++) {
        const da = drops[a];
        if (da.bounced || da.y >= rimY) continue;
        for (let b = a + 1; b < drops.length; b++) {
          const db = drops[b];
          if (db.bounced || db.y >= rimY) continue;
          if (da.t.good === db.t.good) continue;     // only opposite categories
          if (Math.abs(da.y - db.y) >= 120) continue; // arriving around same time
          const dx = da.x - db.x, ax = Math.abs(dx);
          if (ax < NUDGE) {
            const dir = dx >= 0 ? 1 : -1;
            const push = (NUDGE - ax) * 0.5 * dt * 6;  // small, frame-scaled
            da.x = Math.max(30, Math.min(W - 30, da.x + dir * push));
            db.x = Math.max(30, Math.min(W - 30, db.x - dir * push));
          }
        }
      }
    }

    // rain ambience driven by zone (Rain + Thunderstorm)
    const z = curZone();
    const isRain = z.particles === 'rain';
    if (isRain) {
      const cap = z.key === 'thunder' ? 130 : 90;
      if (rainDrops.length < cap) for (let k = 0; k < 3; k++)
        rainDrops.push({ x: Math.random() * W, y: -10, v: 600 + Math.random() * 400, len: 10 + Math.random() * 14 });
      // Plain Rain keeps its periodic distant thunder; Thunderstorm handles its own in updateAtmo
      if (z.key === 'rain') {
        thunderTimer -= dt;
        if (thunderTimer <= 0) { SFX.thunder(); thunderTimer = 9 + Math.random() * 12; }
      }
    }
    for (let i = rainDrops.length - 1; i >= 0; i--) {
      const rdp = rainDrops[i]; rdp.y += rdp.v * dt;
      if (rdp.y > H + 20 || !isRain) rainDrops.splice(i, 1);
    }

    hydration = Math.max(0, Math.min(1, hydration));
    if (hydration <= 0) return gameOver();

    // particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.age += dt; p.vy += 420 * dt;
      p.x += p.vx * dt; p.y += p.vy * dt;
      if (p.age >= p.life) particles.splice(i, 1);
    }
    for (let i = floaters.length - 1; i >= 0; i--) {
      const f = floaters[i]; f.age += dt; f.y -= 40 * dt;
      if (f.age >= f.life) floaters.splice(i, 1);
    }
    if (shakeT > 0) shakeT -= dt;
  }

  function catchDrop(d) {
    const t = d.t;
    if (t.good) {
      player.pop = 1; // cup pop on catch

      if (t.heart) {
        player.pop = 1;
        tele.caughtGood.heart++;
        setHearts(hearts + 1);
        (SFX.fanfare || SFX.golden)();
        haptic('success');
        burst(d.x, d.y, t.color, 26);
        floatText(d.x, d.y - 10, '+1 ❤', '#ff3b5c');
        flashTitle('+1 ❤', 'BANKED');
        cleanStreak++;
        return;
      }

      if (t.shield) {
        tele.caughtGood.shield++;
        tele.powerupsUsed++;
        forceTimer = FORCE_DUR;
        forceField = true;
        SFX.shield();
        haptic('success');
        score += 5;
        burst(d.x, d.y, t.color, 22);
        floatText(d.x, d.y - 10, '🛡 SHIELD', '#2a7fff');
        flashTitle('🛡 SHIELD', '6s force field');
        cleanStreak++;
        return;
      }

      if (t.golden) SFX.golden();
      else if (t.ion) { combo = Math.min(8, combo + 1); comboTimer = 2.2; SFX.ion(combo); }
      else if (d.key === 'water') SFX.water();
      else SFX.good();

      haptic('light');

      // perfect-pitch bonus: caught right on the ambient beat
      const onBeat = onBeatNow();
      let gain = t.pts * combo;
      if (onBeat && !t.golden) { gain += 5; SFX.shimmer(); }

      // telemetry: count by type (aqua/water/ion/golden) + actual hydration gained
      if (tele.caughtGood[d.key] != null) tele.caughtGood[d.key]++;
      { const before = hydration; hydration = Math.min(1, hydration + t.hyd); tele.hydGained += hydration - before; }
      burst(d.x, d.y, t.color, t.golden ? 26 : (t.ion ? 16 : 12));
      floatText(d.x, d.y - 10, '+' + gain + (onBeat ? ' ✨' : (combo > 1 && t.ion ? ' ×' + combo : '')),
        t.golden ? '#d98700' : (t.ion ? '#e8a400' : '#0a8f86'));

      // clean-streak chime every 10 catches in a row
      cleanStreak++;
      if (cleanStreak % 10 === 0) { SFX.chord(); flashTitle('✨ STREAK ×' + cleanStreak); }

      // combo milestone titles
      if (combo >= 8 && lastComboTitle < 8) { lastComboTitle = 8; flashTitle('ION LEGEND'); }
      else if (combo >= 6 && lastComboTitle < 6) { lastComboTitle = 6; flashTitle('ION MASTER'); }
      else if (combo >= 4 && lastComboTitle < 4) { lastComboTitle = 4; flashTitle('HYDRATED'); }
    } else {
      // post-revive invulnerability: bad catches don't hurt
      if (invulnTimer > 0) {
        burst(d.x, d.y, ['#bfe9ff', '#aef6ee'], 10);
        floatText(d.x, d.y - 10, 'SAFE', '#16c2b3');
        return;
      }
      if (tele.caughtBad[d.key] != null) tele.caughtBad[d.key]++;
      tele.hydLostBad += -t.hyd; // t.hyd is negative for bad drops
      hydration += t.hyd; // full penalty always (no low-meter softening)
      combo = 1; comboTimer = 0; cleanStreak = 0; lastComboTitle = 0;
      score = Math.max(0, score - 4);
      burst(d.x, d.y, t.color, 14);
      floatText(d.x, d.y - 10, '−drain', '#e23c3c');
      shakeT = 0.25;
      SFX.bad();
      haptic('warning');
    }
  }

  function gameOver() {
    // Revive opportunity: out of water, has a heart, hasn't revived yet this run.
    if (!revivedThisRun && hearts >= 1) {
      showRevivePrompt();
      return;
    }
    finalGameOver();
  }

  function showRevivePrompt() {
    state = State.OVER;
    SFX.over();
    haptic('warning');
    document.getElementById('reviveHearts').textContent = '❤ x' + hearts;
    document.getElementById('reviveScreen').classList.remove('hidden');
    updateHeartHUD();
  }

  function doRevive() {
    if (revivedThisRun || hearts < 1) return;
    setHearts(hearts - 1);
    revivedThisRun = true;
    tele.revives++;
    SFX.shield();
    haptic('success');
    // clear all currently-falling BAD drops
    drops = drops.filter(d => d.t.good);
    hydration = 0.55;
    combo = 1; comboTimer = 0;
    invulnTimer = 2;
    player.pop = 1;
    flashTitle('REVIVED', '2s shield');
    document.getElementById('reviveScreen').classList.add('hidden');
    last = 0; // avoid a dt jump after the prompt
    state = State.PLAY;
    updateHeartHUD();
    syncHUD();
  }

  function finalGameOver() {
    state = State.OVER;
    SFX.over();
    // Game Center: submit centi-miles
    gc('submit', { score: Math.round(miles * 100) });
    // keep an internal points best too (not displayed)
    if (score > best) { best = score; localStorage.setItem('ionrush_best', best); }
    const isBest = miles > bestMiles;
    if (isBest) { bestMiles = miles; localStorage.setItem('ionrush_best_miles', bestMiles); }
    document.getElementById('finalScore').textContent = miles.toFixed(1) + ' mi';
    document.getElementById('bestScore').textContent = 'Best ' + bestMiles.toFixed(1) + ' mi';
    const msgs = [
      'The Dry takes everyone eventually.',
      'Remi made it further this time.',
      'Every mile counts out here.',
      'So close to the next oasis.'
    ];
    document.getElementById('overMsg').textContent = msgs[Math.floor(elapsed) % msgs.length];

    const banner = document.getElementById('bestBanner');
    if (isBest && miles > 0) {
      banner.textContent = 'New Furthest';
      banner.classList.add('show');
      // celebration burst + triumphant sound
      for (let k = 0; k < 60; k++) {
        const a = Math.random() * Math.PI * 2, s = 80 + Math.random() * 260;
        particles.push({
          x: W / 2, y: H * 0.38, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 60,
          life: 0.9 + Math.random() * 0.7, age: 0,
          r: 2 + Math.random() * 5,
          color: ['#ffd400', '#fff7a8', '#16c2b3'][Math.floor(Math.random() * 3)]
        });
      }
      SFX.fanfare();
      haptic('success');
    } else {
      banner.classList.remove('show');
    }
    overScreen.classList.remove('hidden');
  }

  // ---- Render ----
  function drawBottle(x, y, tilt) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(tilt);
    const pop = 1 + Math.sin(player.pop * Math.PI) * 0.16; // brief scale-up then settle
    ctx.scale(pop, pop);
    const w = player.w, h = player.h;
    const grad = ctx.createLinearGradient(0, -h/2, 0, h/2);
    grad.addColorStop(0, '#37d3c4');
    grad.addColorStop(1, '#0a8f86');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(-w/2, -h/2);
    ctx.lineTo(w/2, -h/2);
    ctx.lineTo(w/2 - 8, h/2);
    ctx.lineTo(-w/2 + 8, h/2);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.55)';
    ctx.fillRect(-w/2, -h/2, w, 5);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(-w/2+2, -2);
    ctx.quadraticCurveTo(0, -16, w/2-2, 2);
    ctx.lineTo(w/2-4, 12);
    ctx.quadraticCurveTo(0, -4, -w/2+4, 10);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#0a8f86';
    ctx.font = '900 italic 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('ION', 0, 26);
    ctx.restore();
  }

  function heartPath(c, r) {
    // canvas heart shape centred near origin, sized to ~radius r
    c.beginPath();
    c.moveTo(0, r * 0.72);
    c.bezierCurveTo(-r * 1.25, -r * 0.18, -r * 0.55, -r * 1.1, 0, -r * 0.35);
    c.bezierCurveTo(r * 0.55, -r * 1.1, r * 1.25, -r * 0.18, 0, r * 0.72);
    c.closePath();
  }

  function drawDrop(d) {
    const t = d.t, r = t.r;
    const wob = Math.sin(d.wob) * 1.5;
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.rotate(Math.sin(d.rot) * 0.2);
    if (d.decoy) ctx.globalAlpha = 0.4 + 0.25 * Math.sin(elapsed * 12 + d.wob); // shimmering mirage

    if (t.heart) {
      const pulse = 1 + Math.sin(d.wob) * 0.05;
      ctx.scale(pulse, pulse);
      ctx.save();
      ctx.shadowColor = 'rgba(255,59,92,.9)'; ctx.shadowBlur = 20;
      const hg = ctx.createRadialGradient(-r * 0.3, -r * 0.4, 1, 0, 0, r * 1.3);
      hg.addColorStop(0, t.color[0]);
      hg.addColorStop(1, t.color[1]);
      ctx.fillStyle = hg;
      heartPath(ctx, r);
      ctx.fill();
      ctx.restore();
      // glossy highlight
      ctx.fillStyle = 'rgba(255,255,255,.55)';
      ctx.beginPath();
      ctx.ellipse(-r * 0.32, -r * 0.42, r * 0.18, r * 0.3, -0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      return;
    }
    const g = ctx.createRadialGradient(-r*0.3, -r*0.4, 1, 0, 0, r*1.4);
    g.addColorStop(0, t.color[0]);
    g.addColorStop(1, t.color[1]);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(0, -r*1.5 + wob);
    ctx.bezierCurveTo(r*1.2, -r*0.2, r*0.9, r*1.1, 0, r*1.1);
    ctx.bezierCurveTo(-r*0.9, r*1.1, -r*1.2, -r*0.2, 0, -r*1.5 + wob);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.6)';
    ctx.beginPath();
    ctx.ellipse(-r*0.3, -r*0.3, r*0.22, r*0.4, -0.5, 0, Math.PI*2);
    ctx.fill();
    if (t.ion) {
      ctx.fillStyle = '#9a6b00';
      ctx.font = '900 12px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('+', 0, r*0.1);
    }
    if (t.shield) {
      ctx.save();
      ctx.shadowColor = '#5aa9ff'; ctx.shadowBlur = 14;
      ctx.strokeStyle = 'rgba(200,230,255,.95)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 0, r * 0.95, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
      ctx.fillStyle = '#fff';
      ctx.font = '900 14px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('🛡', 0, r * 0.12);
    }
    if (t.golden) {
      ctx.save();
      ctx.shadowColor = '#ffd400'; ctx.shadowBlur = 16;
      ctx.strokeStyle = 'rgba(255,230,120,.9)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 0, r * 0.95, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
      ctx.fillStyle = '#9a6b00';
      ctx.font = '900 13px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('★', 0, r * 0.12);
    }
    if (!t.good) {
      ctx.strokeStyle = 'rgba(255,255,255,.85)'; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(-r*0.4,-r*0.4); ctx.lineTo(r*0.4,r*0.4);
      ctx.moveTo(r*0.4,-r*0.4); ctx.lineTo(-r*0.4,r*0.4); ctx.stroke();
    }
    ctx.restore();
  }

  // ---- horizon silhouette per zone `deco` ----
  function drawDeco(z) {
    const hor = H * 0.72;
    ctx.save();
    ctx.fillStyle = z.decoColor;
    if (z.deco === 'dunes') {
      ctx.beginPath(); ctx.moveTo(0, H);
      let x = -40;
      while (x < W + 80) { const r = 70 + ((x * 7) % 60); ctx.arc(x, hor + 30, r, Math.PI, 0, false); x += r * 1.4; }
      ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
    } else if (z.deco === 'mesa') {
      let x = -20;
      while (x < W + 40) {
        const w = 60 + ((x * 13) % 70), h = 50 + ((x * 17) % 90);
        ctx.fillRect(x, hor - h + 40, w, H - (hor - h + 40));
        x += w + 18 + ((x * 5) % 30);
      }
    } else if (z.deco === 'cacti') {
      ctx.fillRect(0, hor + 40, W, H - hor - 40); // ground
      ctx.lineWidth = 0;
      for (let i = 0; i < 6; i++) {
        const cx = (i + 0.5) * (W / 6) + ((i * 31) % 22) - 11, base = hor + 44, hh = 40 + ((i * 23) % 36);
        ctx.fillRect(cx - 5, base - hh, 10, hh);
        ctx.fillRect(cx - 18, base - hh * 0.6, 8, 4); ctx.fillRect(cx - 18, base - hh * 0.6 - 16, 8, 18);
        ctx.fillRect(cx + 10, base - hh * 0.75, 8, 4); ctx.fillRect(cx + 10, base - hh * 0.75 - 14, 8, 16);
      }
    } else if (z.deco === 'palms') {
      ctx.fillRect(0, hor + 40, W, H - hor - 40); // lush ground
      for (let i = 0; i < 4; i++) {
        const cx = (i + 0.5) * (W / 4), base = hor + 44, hh = 70 + ((i * 29) % 30);
        ctx.fillStyle = '#7a4a22'; ctx.fillRect(cx - 4, base - hh, 8, hh);
        ctx.fillStyle = z.decoColor;
        for (let f = 0; f < 5; f++) {
          const a = -Math.PI / 2 + (f - 2) * 0.5;
          ctx.beginPath(); ctx.moveTo(cx, base - hh);
          ctx.quadraticCurveTo(cx + Math.cos(a) * 28, base - hh - 18, cx + Math.cos(a) * 46, base - hh + 6 + Math.sin(a) * 10);
          ctx.lineWidth = 6; ctx.strokeStyle = z.decoColor; ctx.stroke();
        }
      }
    } else if (z.deco === 'sea') {
      const sg = ctx.createLinearGradient(0, hor + 20, 0, H);
      sg.addColorStop(0, 'rgba(255,255,255,.4)'); sg.addColorStop(0.15, z.decoColor); sg.addColorStop(1, z.decoColor);
      ctx.fillStyle = sg; ctx.fillRect(0, hor + 20, W, H - hor - 20);
      ctx.strokeStyle = 'rgba(255,255,255,.35)'; ctx.lineWidth = 2;
      for (let r = 0; r < 4; r++) {
        const yy = hor + 40 + r * 18;
        ctx.beginPath();
        for (let xx = 0; xx <= W; xx += 12) ctx.lineTo(xx, yy + Math.sin(xx * 0.05 + elapsed * 2 + r) * 3);
        ctx.stroke();
      }
    } else if (z.deco === 'flat') {
      ctx.fillRect(0, hor + 42, W, H - hor - 42);
    }
    // fog/none: skip silhouette
    ctx.restore();
  }

  // ---- atmosphere particle layer per `particles` ----
  function drawAtmo(z) {
    const p = z.particles;
    if (p === 'dust') {
      ctx.fillStyle = '#e8d49a';
      for (const m of atmo) { ctx.globalAlpha = m.a; ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2); ctx.fill(); }
      ctx.globalAlpha = 1;
    } else if (p === 'fireflies') {
      for (const m of atmo) {
        const gl = 0.3 + 0.7 * Math.abs(Math.sin(m.ph));
        ctx.globalAlpha = gl; ctx.fillStyle = '#fff4a0';
        ctx.shadowColor = '#ffe060'; ctx.shadowBlur = 8;
        ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2); ctx.fill();
      }
      ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    } else if (p === 'ash') {
      for (const m of atmo) {
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = m.ember ? ('rgba(255,' + (90 + ((m.ph * 30) | 0) % 80) + ',40,0.9)') : 'rgba(60,40,40,0.8)';
        if (m.ember) { ctx.shadowColor = '#ff5a1e'; ctx.shadowBlur = 8; }
        ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
      }
      ctx.globalAlpha = 1;
    } else if (p === 'snow') {
      ctx.fillStyle = '#ffffff';
      for (const m of atmo) { ctx.globalAlpha = 0.85; ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2); ctx.fill(); }
      ctx.globalAlpha = 1;
    } else if (p === 'heat') {
      // subtle vertical shimmer bands
      ctx.save(); ctx.globalAlpha = 0.06; ctx.fillStyle = '#fff';
      for (let i = 0; i < 6; i++) {
        const xx = (i / 6) * W + Math.sin(elapsed * 2 + i) * 8;
        ctx.fillRect(xx, H * 0.4, W / 6 * 0.5, H * 0.5);
      }
      ctx.restore();
    } else if (p === 'mist') {
      ctx.fillStyle = 'rgba(220,228,222,.12)'; ctx.fillRect(0, H * 0.45, W, H * 0.55);
    }
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    let sx = 0, sy = 0;
    if (shakeT > 0) { sx = (Math.random()-.5)*10*shakeT*4; sy = (Math.random()-.5)*10*shakeT*4; }
    ctx.save();
    ctx.translate(sx, sy);

    const z = curZone();
    const night = z.particles === 'stars' || z.particles === 'aurora';
    // base sky gradient (cross-faded rgb)
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, rgbStr(skyTop));
    sky.addColorStop(1, rgbStr(skyBot));
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

    // ---- aurora ribbons (deep night) ----
    if (z.particles === 'aurora') {
      ctx.save();
      const cols = ['rgba(90,230,200,', 'rgba(120,160,255,', 'rgba(180,120,255,'];
      for (let b = 0; b < 3; b++) {
        ctx.beginPath();
        const yBase = H * (0.18 + b * 0.09);
        for (let xx = 0; xx <= W; xx += 16) {
          const yy = yBase + Math.sin(xx * 0.012 + elapsed * 0.6 + b) * 26 + Math.sin(xx * 0.03 + elapsed) * 10;
          if (xx === 0) ctx.moveTo(xx, yy); else ctx.lineTo(xx, yy);
        }
        ctx.lineTo(W, yBase + 70); ctx.lineTo(0, yBase + 70); ctx.closePath();
        const ag = ctx.createLinearGradient(0, yBase - 30, 0, yBase + 70);
        ag.addColorStop(0, cols[b] + '0)');
        ag.addColorStop(0.5, cols[b] + (0.16 + 0.06 * Math.sin(elapsed + b)) + ')');
        ag.addColorStop(1, cols[b] + '0)');
        ctx.fillStyle = ag; ctx.fill();
      }
      ctx.restore();
    }

    if (night) {
      for (const st of stars) {
        ctx.globalAlpha = 0.45 + 0.55 * Math.sin(elapsed * 2 + st.tw);
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(st.x, st.y, st.r, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      const mx = W * 0.74, my = H * 0.17, mr = Math.min(W, H) * 0.1;
      const mg = ctx.createRadialGradient(mx - mr * 0.3, my - mr * 0.3, mr * 0.2, mx, my, mr);
      mg.addColorStop(0, '#fdfbe7'); mg.addColorStop(1, '#cdd6e0');
      ctx.fillStyle = mg; ctx.beginPath(); ctx.arc(mx, my, mr, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(150,160,175,.45)';
      [[0.3, -0.2, 0.18], [-0.25, 0.15, 0.22], [0.12, 0.36, 0.14]].forEach(c => {
        ctx.beginPath(); ctx.arc(mx + c[0] * mr, my + c[1] * mr, c[2] * mr, 0, Math.PI * 2); ctx.fill();
      });
    } else if (z.particles !== 'rain' && z.key !== 'thunder') {
      const bloom = ctx.createRadialGradient(W*0.5, H*0.2, 10, W*0.5, H*0.2, H*0.7);
      bloom.addColorStop(0, 'rgba(255,255,255,.5)');
      bloom.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = bloom; ctx.fillRect(0,0,W,H);
    }

    drawDeco(z);
    drawAtmo(z);

    for (const d of drops) drawDrop(d);

    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, 1 - p.age / p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // rain streaks (zone-driven)
    if (z.particles === 'rain' && rainDrops.length) {
      ctx.strokeStyle = 'rgba(200,230,255,.5)'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (const rdp of rainDrops) { ctx.moveTo(rdp.x, rdp.y); ctx.lineTo(rdp.x - 2, rdp.y + rdp.len); }
      ctx.stroke();
    }

    // ---- cosmetic atmosphere overlays ----
    if (z.twist === 'lowvis' || z.deco === 'fog') {
      ctx.fillStyle = 'rgba(200,205,200,.16)'; ctx.fillRect(0, 0, W, H);
    }
    if (z.bright || z.twist === 'glare') {
      ctx.fillStyle = 'rgba(255,255,255,.14)'; ctx.fillRect(0, 0, W, H);
    }
    if (z.key === 'thunder' && lightningFlash > 0) {
      ctx.fillStyle = 'rgba(235,240,255,' + (lightningFlash * 0.55).toFixed(3) + ')';
      ctx.fillRect(0, 0, W, H);
    }

    if (forceField && state === State.PLAY) {
      const tt = elapsed * 3, fy = H * 0.6;
      const fade = Math.min(1, forceTimer / 1.2); // fade out in the last ~1.2s
      ctx.save();
      ctx.globalAlpha = fade;
      ctx.strokeStyle = 'rgba(150,200,255,' + (0.28 + 0.12 * Math.sin(tt)) + ')';
      ctx.lineWidth = 2; ctx.setLineDash([9, 9]);
      ctx.beginPath(); ctx.moveTo(0, fy); ctx.lineTo(W, fy); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(120,180,255,.06)';
      ctx.fillRect(0, fy, W, H - fy);
      ctx.strokeStyle = 'rgba(120,200,255,' + (0.45 + 0.2 * Math.sin(tt)) + ')';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(player.x, player.y - 6, 72 + Math.sin(tt) * 4, 0, Math.PI * 2); ctx.stroke();

      // ---- power-up countdown ring (teal, depletes full->empty) ----
      const frac = Math.max(0, Math.min(1, forceTimer / FORCE_DUR));
      const ringR = 94, ringCx = player.x, ringCy = player.y - 6;
      const ending = forceTimer < 1; // last ~1s: tint/flash to red
      const flash = ending ? (0.5 + 0.5 * Math.sin(elapsed * 26)) : 1;
      // faint full-circle track
      ctx.globalAlpha = fade * 0.22;
      ctx.strokeStyle = '#16c2b3';
      ctx.lineWidth = 5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(ringCx, ringCy, ringR, 0, Math.PI * 2); ctx.stroke();
      // remaining arc (depletes clockwise from the top)
      ctx.globalAlpha = fade * (ending ? (0.55 + 0.45 * flash) : 1);
      ctx.strokeStyle = ending ? '#ff5a4d' : '#16c2b3';
      ctx.lineWidth = ending ? 6 : 5;
      ctx.beginPath();
      ctx.arc(ringCx, ringCy, ringR, -Math.PI/2, -Math.PI/2 + frac * Math.PI * 2);
      ctx.stroke();
      ctx.lineCap = 'butt';
      ctx.restore();
    }

    // post-revive invulnerability: flashing protective ring around the cup
    if (invulnTimer > 0 && state === State.PLAY) {
      const fl = 0.5 + 0.5 * Math.sin(elapsed * 22);
      ctx.save();
      ctx.globalAlpha = 0.55 + 0.35 * fl;
      ctx.strokeStyle = 'rgba(120,200,255,.9)';
      ctx.lineWidth = 3 + fl * 2;
      ctx.beginPath();
      ctx.arc(player.x, player.y - 6, 70 + fl * 6, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    if (state === State.PLAY || state === State.OVER) drawBottle(player.x, player.y, player.tilt);

    for (const f of floaters) {
      ctx.globalAlpha = Math.max(0, 1 - f.age / f.life);
      ctx.fillStyle = f.color;
      ctx.font = '900 18px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(f.text, f.x, f.y);
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function syncHUD() {
    // --- miles serif readout ---
    HUD.milesReadout.innerHTML = miles.toFixed(1) + ' <span>mi' + (combo>1?' ×'+combo:'') + '</span>';

    // --- Remi walks L→R across the bar over each mile, resets on rollover ---
    const whole = Math.floor(miles);
    if (whole > lastWholeMile) {
      lastWholeMile = whole;
      // jump the walker back to the start without easing across the bar
      HUD.walker.classList.add('reset');
      HUD.walker.style.left = '0%';
      // force reflow so the next (eased) move animates from the left edge
      void HUD.walker.offsetWidth;
      HUD.walker.classList.remove('reset');
      // subtle footprint accent at the right edge where the mile ticked over
      const step = document.createElement('div');
      step.className = 'step';
      step.style.left = '99%';
      HUD.trail.appendChild(step);
      setTimeout(() => step.remove(), 1000);
    }
    const frac = miles - whole;
    HUD.walker.style.left = (frac * 100).toFixed(2) + '%';
    HUD.walker.classList.toggle('bob', state === State.PLAY);

    // --- hydration as a water "health" gauge ---
    HUD.healthFill.style.height = (hydration * 100).toFixed(1) + '%';
    HUD.healthGauge.classList.toggle('low', hydration < 0.25);
    HUD.healthGauge.classList.toggle('mid', hydration >= 0.25 && hydration < 0.5);

    updateHeartHUD();
  }

  function updateSpeedBadge() {
    const b = document.getElementById('speedBadge');
    if (b) { b.textContent = speed + '×'; b.classList.toggle('boost', speed > 1); }
    const m = document.getElementById('muteBtn');
    if (m) { m.textContent = muted ? '🔇' : '🔊'; m.classList.toggle('muted', muted); }
  }
  function toggleMute() {
    muted = !muted;
    if (!muted) { initAudio(); SFX.speed(); }
    updateSpeedBadge();
  }

  // ---- Loop ----
  let last = 0;
  function loop(ts) {
    const now = ts / 1000;
    let dt = last ? now - last : 0;
    last = now;
    dt = Math.min(dt, 0.05);
    if (state === State.PLAY) {
      let scaled = dt * speed;
      const steps = Math.max(1, Math.ceil(scaled / 0.02));
      const sdt = scaled / steps;
      for (let s = 0; s < steps && state === State.PLAY; s++) update(sdt);
      syncHUD();
    }
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ---- Onboarding ----
  const REMI_HERO = 'assets/remi_hero.png';
  const REMI_HAPPY = 'assets/remi_happy.png';
  const CARDS = [
    { html: 'Meet <b>Remi</b>. Remi wandered deep into <i>the Dry</i> chasing the horizon — and the canteen ran empty.', img: REMI_HERO, emoji: '🥵' },
    { html: 'But the sky is raining hydration — <b>water</b> and <b>ion drinks</b>. You hold Remi\'s cup. Catch every good drop.', img: REMI_HERO, emoji: '🌧️' },
    { html: 'Skip the <b>soda</b> and <b>coffee</b> — out in the Dry they only make the thirst worse.', img: null, emoji: '☕' },
    { html: 'Keep Remi going as long as you can. Ready?', img: REMI_HAPPY, emoji: '✨' },
  ];
  const onboard = document.getElementById('onboard');
  const obArt = document.getElementById('obArt');
  const obText = document.getElementById('obText');
  const obDots = document.getElementById('obDots');
  const obNext = document.getElementById('obNext');
  const obSkip = document.getElementById('obSkip');
  let cardIdx = 0;

  for (let i = 0; i < CARDS.length; i++) { const d = document.createElement('div'); d.className = 'od'; obDots.appendChild(d); }

  function renderCard() {
    const c = CARDS[cardIdx];
    obText.innerHTML = c.html;
    obArt.innerHTML = '';
    if (c.img) {
      const im = document.createElement('img');
      im.alt = '';
      im.onerror = () => { obArt.textContent = c.emoji; };
      im.src = c.img;
      obArt.appendChild(im);
    } else {
      obArt.textContent = c.emoji;
    }
    Array.from(obDots.children).forEach((d, i) => d.classList.toggle('on', i === cardIdx));
    obNext.textContent = cardIdx === CARDS.length - 1 ? 'Catch water →' : 'Next';
  }

  function showOnboard() {
    cardIdx = 0;
    renderCard();
    onboard.classList.remove('hidden');
  }
  function finishOnboard() {
    localStorage.setItem('ionrush_onboarded', '1');
    onboard.classList.add('hidden');
  }
  obNext.addEventListener('click', () => {
    initAudio(); SFX.click();
    if (cardIdx < CARDS.length - 1) { cardIdx++; renderCard(); }
    else { finishOnboard(); startGame(); }
  });
  obSkip.addEventListener('click', () => { SFX.click(); finishOnboard(); });

  // ---- Buttons ----
  function startGame() {
    initAudio();
    SFX.start();
    resize(); reset();
    onboard.classList.add('hidden');
    startScreen.classList.add('hidden');
    overScreen.classList.add('hidden');
    document.getElementById('reviveScreen').classList.add('hidden');
    document.getElementById('bestBanner').classList.remove('show');
    dragging = false; last = 0;
    state = State.PLAY;
    syncHUD();
    updateSpeedBadge();
    updateHeartHUD();
  }
  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('againBtn').addEventListener('click', startGame);
  document.getElementById('speedBadge').addEventListener('click', () => { initAudio(); setSpeed(speedIdx + 1); });
  document.getElementById('muteBtn').addEventListener('click', toggleMute);

  // Revive prompt actions
  document.getElementById('reviveBtn').addEventListener('click', () => { initAudio(); doRevive(); });
  document.getElementById('endRunBtn').addEventListener('click', () => {
    initAudio(); SFX.click();
    document.getElementById('reviveScreen').classList.add('hidden');
    finalGameOver();
  });

  // Leaderboard buttons (Game Center; no-op on web)
  document.getElementById('lbStartBtn').addEventListener('click', () => { initAudio(); SFX.click(); gc('show'); });
  document.getElementById('lbOverBtn').addEventListener('click', () => { initAudio(); SFX.click(); gc('show'); });

  // ---- Share score card ----
  const shareImg = new Image();
  let shareImgLoaded = false;
  shareImg.onload = () => { shareImgLoaded = true; };
  shareImg.onerror = () => { shareImgLoaded = false; };
  shareImg.src = REMI_HAPPY;

  function buildShareCard() {
    const S = 1080;
    const c = document.createElement('canvas');
    c.width = S; c.height = S;
    const x = c.getContext('2d');
    const bg = x.createLinearGradient(0, 0, S, S);
    bg.addColorStop(0, '#18d6c6');
    bg.addColorStop(0.6, '#0a8f86');
    bg.addColorStop(1, '#06403d');
    x.fillStyle = bg; x.fillRect(0, 0, S, S);
    const bloom = x.createRadialGradient(S*0.5, S*0.32, 20, S*0.5, S*0.32, S*0.6);
    bloom.addColorStop(0, 'rgba(255,255,255,.22)');
    bloom.addColorStop(1, 'rgba(255,255,255,0)');
    x.fillStyle = bloom; x.fillRect(0, 0, S, S);

    x.textAlign = 'center';
    x.fillStyle = '#e9fffb';
    x.font = '900 italic 96px -apple-system, sans-serif';
    x.fillText('ION RUSH', S/2, 180);

    if (shareImgLoaded) {
      try { x.drawImage(shareImg, S/2 - 160, 230, 320, 320); } catch (e) { drawCardDrop(x, S/2, 390, 150); }
    } else {
      drawCardDrop(x, S/2, 390, 150);
    }

    x.fillStyle = 'rgba(255,255,255,.8)';
    x.font = '700 44px -apple-system, sans-serif';
    x.fillText('THE CROSSING', S/2, 660);
    x.fillStyle = '#ffffff';
    x.font = '900 180px -apple-system, sans-serif';
    x.fillText(miles.toFixed(1) + ' mi', S/2, 830);
    x.fillStyle = '#aef6ee';
    x.font = '700 52px -apple-system, sans-serif';
    x.fillText('Best ' + bestMiles.toFixed(1) + ' mi', S/2, 910);
    x.fillStyle = 'rgba(255,255,255,.85)';
    x.font = '600 italic 42px -apple-system, sans-serif';
    x.fillText('Keep Remi going through the Dry.', S/2, 1000);

    return c.toDataURL('image/png');
  }
  function drawCardDrop(x, cx, cy, r) {
    x.save();
    x.translate(cx, cy);
    const g = x.createRadialGradient(-r*0.3, -r*0.4, 4, 0, 0, r*1.4);
    g.addColorStop(0, '#aef6ee'); g.addColorStop(1, '#16c2b3');
    x.fillStyle = g;
    x.beginPath();
    x.moveTo(0, -r*1.5);
    x.bezierCurveTo(r*1.2, -r*0.2, r*0.9, r*1.1, 0, r*1.1);
    x.bezierCurveTo(-r*0.9, r*1.1, -r*1.2, -r*0.2, 0, -r*1.5);
    x.closePath(); x.fill();
    x.fillStyle = 'rgba(255,255,255,.6)';
    x.beginPath(); x.ellipse(-r*0.3, -r*0.35, r*0.2, r*0.38, -0.5, 0, Math.PI*2); x.fill();
    x.restore();
  }

  function dataURLtoFile(dataURL, name) {
    const parts = dataURL.split(',');
    const bin = atob(parts[1]);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return new File([arr], name, { type: 'image/png' });
  }

  async function shareScore() {
    initAudio(); SFX.click();
    let dataURL;
    try { dataURL = buildShareCard(); } catch (e) { return; }
    const text = 'I crossed ' + miles.toFixed(1) + ' mi of the Dry in Ion Rush! 💧';
    // (a) native bridge
    try {
      if (window.webkit?.messageHandlers?.share) {
        window.webkit.messageHandlers.share.postMessage({ image: dataURL, text });
        return;
      }
    } catch (e) {}
    // (b) Web Share with file
    try {
      const file = dataURLtoFile(dataURL, 'ionrush.png');
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], text });
        return;
      }
    } catch (e) {}
    // (c) download fallback
    try {
      const a = document.createElement('a');
      a.href = dataURL; a.download = 'ionrush-score.png';
      document.body.appendChild(a); a.click(); a.remove();
    } catch (e) {}
  }
  document.getElementById('shareBtn').addEventListener('click', shareScore);

  // ---- Debug telemetry export ----
  function showToast(msg) {
    const t = document.getElementById('toast');
    if (!t) return;
    t.textContent = msg || 'copied!';
    t.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => t.classList.remove('show'), 1400);
  }
  function buildDebugReport() {
    const cg = tele.caughtGood, cb = tele.caughtBad;
    const totGood = cg.aqua + cg.water + cg.ion + cg.golden + cg.heart + cg.shield;
    const totBad = cb.soda + cb.coffee;
    const consts = {
      drainBase: 0.034, drainRamp: 0.0007, emberMul: 1.3,
      refillOasis: 0.15, refillTopupCap: 1,
      narrowStep: 0.97, narrowFloor: 0.70, baseW: BASE_W,
      mirageDecoyChance: 0.25,
    };
    const blob = {
      duration: +elapsed.toFixed(1), miles: +miles.toFixed(2), best: +bestMiles.toFixed(2),
      caughtGood: cg, caughtBad: cb, missedGood: tele.missedGood, decoys: tele.decoys,
      wallBounces: tele.wallBounces,
      hydMin: +tele.hydMin.toFixed(3),
      hydGained: +tele.hydGained.toFixed(3),
      hydLostPassive: +tele.hydLostPassive.toFixed(3),
      hydLostBad: +tele.hydLostBad.toFixed(3),
      hydNet: +(tele.hydGained - tele.hydLostPassive - tele.hydLostBad).toFixed(3),
      powerupsUsed: tele.powerupsUsed, revives: tele.revives,
      zonesVisited: tele.zonesVisited, timeline: tele.timeline, constants: consts,
    };
    const L = [];
    L.push('=== ION RUSH — RUN DEBUG REPORT ===');
    L.push('duration: ' + blob.duration + 's   miles: ' + blob.miles + '   best: ' + blob.best);
    L.push('');
    L.push('-- CATCHES --');
    L.push('good caught (' + totGood + '): aqua ' + cg.aqua + ', water ' + cg.water + ', ion ' + cg.ion +
           ', golden ' + cg.golden + ', heart ' + cg.heart + ', shield ' + cg.shield);
    L.push('bad caught (' + totBad + '): soda ' + cb.soda + ', coffee ' + cb.coffee);
    L.push('good MISSED (fell past): ' + tele.missedGood);
    L.push('mirage decoys encountered: ' + tele.decoys);
    L.push('wall bounces: ' + tele.wallBounces);
    L.push('');
    L.push('-- HYDRATION --');
    L.push('min: ' + blob.hydMin);
    L.push('gained: ' + blob.hydGained + '   lost(passive): ' + blob.hydLostPassive +
           '   lost(bad): ' + blob.hydLostBad);
    L.push('NET: ' + blob.hydNet);
    L.push('');
    L.push('-- RUN --');
    L.push('powerups used: ' + tele.powerupsUsed + '   revives: ' + tele.revives);
    L.push('zones (in order): ' + tele.zonesVisited.join(' → '));
    L.push('');
    L.push('-- TIMELINE (~3s) --');
    for (const s of tele.timeline) L.push('  t' + s.t + 's  ' + s.miles + 'mi  hyd ' +
      s.hyd + '  ' + s.zone + '  cupW ' + s.cupW);
    L.push('');
    L.push('-- BALANCE CONSTANTS --');
    L.push('drain base ' + consts.drainBase + ' +ramp ' + consts.drainRamp + '/s (ember ×' + consts.emberMul + ')');
    L.push('refills: oasis +' + consts.refillOasis + ' (top-up cap ' + consts.refillTopupCap + ')');
    L.push('narrowing: step ' + consts.narrowStep + ', floor ' + consts.narrowFloor + ' × baseW(' + consts.baseW + ')');
    L.push('mirage decoy chance: ' + consts.mirageDecoyChance);
    L.push('');
    L.push('JSON: ' + JSON.stringify(blob));
    return L.join('\n');
  }
  function copyDebugLog() {
    initAudio(); SFX.click();
    const text = buildDebugReport();
    const fallback = () => {
      try {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.focus(); ta.select();
        document.execCommand('copy'); ta.remove();
        showToast('copied!');
      } catch (e) { showToast('copy failed'); }
    };
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => showToast('copied!'), fallback);
      } else fallback();
    } catch (e) { fallback(); }
  }
  document.getElementById('debugBtn').addEventListener('click', copyDebugLog);

  // ---- Replay intro (native onboarding bridge, with web fallback) ----
  function replayIntro(){
    try{
      if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.replayOnboarding) {
        window.webkit.messageHandlers.replayOnboarding.postMessage({});
        return;
      }
    }catch(e){}
    // web fallback: clear the flag and re-show the in-page onboarding if present
    try { localStorage.removeItem('ionrush_onboarded'); } catch(e){}
    if (typeof showOnboard === 'function') showOnboard();
  }
  document.getElementById('replayIntroBtn').addEventListener('click', () => { initAudio(); SFX.click(); replayIntro(); });

  // ---- First-load onboarding ----
  if (!localStorage.getItem('ionrush_onboarded')) {
    showOnboard();
  }

  updateSpeedBadge();
  resetTelemetry();

})();
</script>
</body>
